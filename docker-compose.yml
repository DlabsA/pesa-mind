services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: pesamind
      POSTGRES_PASSWORD: pesamind123
      POSTGRES_DB: pesamind
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./migrations/00001_init.sql:/docker-entrypoint-initdb.d/00001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pesamind"]
      interval: 10s
      timeout: 5s
      retries: 5
  app:
    build: .
    command: ./pesa-mind
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
volumes:
  db_data:
