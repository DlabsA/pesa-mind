services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: pesamind
      POSTGRES_PASSWORD: pesamind123
      POSTGRES_DB: pesamind
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./migrations/00001_init.sql:/docker-entrypoint-initdb.d/00001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pesamind"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    build: .
    command: ./pesa-mind
    expose:
      - "8080"
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2019/metrics" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - internal
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped


networks:
  internal:
    driver: bridge

volumes:
  db_data:
  caddy_data:
  caddy_config:
