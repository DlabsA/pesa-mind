services:
  db:
    image: postgres:16
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pesamind
      POSTGRES_PASSWORD: pesamind123
      POSTGRES_DB: pesamind
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./migrations/00001_init.sql:/docker-entrypoint-initdb.d/00001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pesamind"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    build: .
    command: ./pesa-mind
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  internal:
    driver: bridge

volumes:
  db_data:
  caddy_data:
  caddy_config:
