name: Deploy to Server on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code from the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up SSH agent with the private key from GitHub Secrets
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # Step 2.1: Debug SSH key setup
      - name: Debug SSH Key
        run: |
          echo "Validating SSH key setup..."
          ssh-add -l
          ssh -T git@github.com || echo "SSH key validation failed. Ensure the key is added as a deploy key in GitHub."

      # Step 3: Add server's SSH fingerprint to known_hosts
      - name: Add server to known_hosts
        run: |
          echo "Adding server's SSH fingerprint to known_hosts..."
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts
          echo "Known hosts file content:"  # Debugging information
          cat ~/.ssh/known_hosts

      # Step 3.1: Debug SSH key setup
      - name: Debug SSH Key Setup
        run: |
          echo "Testing SSH key setup..."
          ssh -T git@github.com || echo "SSH key validation failed. Ensure the key is added as a deploy key in GitHub."

      # Step 3.2: Verify repository access
      - name: Verify Repository Access
        run: |
          echo "Testing repository access..."
          ssh -o StrictHostKeyChecking=no deploy@${{ secrets.SERVER_IP }} "git ls-remote git@github.com:DlabsA/pesa-mind.git HEAD" || echo "Repository access failed. Check deploy key permissions."

      # Step 3.3: Debug Host Key Verification
      - name: Debug Host Key Verification
        run: |
          echo "Testing host key verification..."
          ssh -o StrictHostKeyChecking=no deploy@${{ secrets.SERVER_IP }} "echo 'SSH connection successful'" || echo "Host key verification failed. Ensure the server's fingerprint is added to known_hosts."

      # Step 3.4: Debug Known Hosts File
      - name: Debug Known Hosts File
        run: |
          echo "Known hosts file content after adding server's fingerprint:"
          cat ~/.ssh/known_hosts || echo "Failed to read known_hosts file."

      # Step 3.5: Clean Up and Re-add Host Key
      - name: Clean Up and Re-add Host Key
        run: |
          echo "Cleaning up and re-adding the host key..."
          ssh-keygen -R ${{ secrets.SERVER_IP }} || echo "No existing host key to remove."
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts
          echo "Re-added server's SSH fingerprint to known_hosts."
          echo "Updated known_hosts file content:"  # Debugging information
          cat ~/.ssh/known_hosts

      # Step 4: Pull the latest changes on the server
      - name: Deploy application
        run: |
          ssh deploy@${{ secrets.SERVER_IP }} << 'EOF'
            # Navigate to the project directory or clone the repository if it doesn't exist
            # Check if the directory exists and is a Git repository
            if [ -d "/home/deploy/pesa-mind" ]; then
              if [ ! -d "/home/deploy/pesa-mind/.git" ]; then
                echo "Directory exists but is not a Git repository. Removing it..."
                rm -rf /home/deploy/pesa-mind
              fi
            fi

            # Clone the repository if it doesn't exist
            if [ ! -d "/home/deploy/pesa-mind" ]; then
              echo "Cloning the repository..."
              git clone git@github.com:DlabsA/pesa-mind.git /home/deploy/pesa-mind
            fi

            cd /home/deploy/pesa-mind

            # Pull the latest changes
            git reset --hard
            git pull origin main

            # Ensure Docker Compose is installed and up-to-date
            if ! command -v docker compose &> /dev/null; then
              echo "Docker Compose not found. Installing..."
              sudo curl -L "https://github.com/docker/compose/releases/download/v2.20.2/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            fi

            # Ensure the .env file exists
            if [ ! -f ".env" ]; then
              echo "$ENV_FILE_CONTENT" > .env
            fi

            # Build and restart the application
            docker compose build --no-cache
            docker compose down
            docker compose up -d --remove-orphans
          EOF
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE_CONTENT }}
