name: Deploy to Server

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    name: SSH & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 1. Write the private key to a temp file ──────────────────────────────
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # ── 2. SSH in, pull latest code, make deploy.sh executable, then deploy ──
      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'

            set -e

            # Path where the repo lives on your server
            cd ~/pesa-mind

#            Restore deploy.sh to ensure we have the latest version from the repo
            git restore deploy.sh

            echo "📦 Pulling latest changes..."
            git pull origin main

            echo "🔧 Making deploy script executable..."
            chmod +x deploy.sh

            echo "🚀 Running automated deployment..."
            export CI=true
            ./deploy.sh

            echo "✅ Deployment script completed successfully"

          EOF

      # ── 3. Health check on the application ─────────────────────────────────
      - name: Health check
        run: |
          echo "⏳ Waiting 10 seconds for service to stabilize..."
          sleep 10
          echo "🏥 Checking health endpoint..."
          curl -f http://${{ secrets.SERVER_HOST }}:8080/health && echo "✅ Health check passed" || (echo "❌ Health check failed" && exit 1)

      # ── 4. Post deployment info ────────────────────────────────────────────
      - name: Deployment summary
        if: success()
        run: |
          echo "✅ Deployment Successful!"
          echo ""
          echo "🌐 Access URLs:"
          echo "  HTTP:  http://${{ secrets.SERVER_HOST }}:8080"
          echo "  HTTPS: https://${{ secrets.SERVER_HOST }}:8443"
          echo ""
          echo "📋 Useful commands:"
          echo "  ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}"
          echo "  cd ~/pesa-mind && docker ps"
          echo "  docker logs pesa-mind-app-1"

      # ── 5. Failure notification ────────────────────────────────────────────
      - name: Deployment failed
        if: failure()
        run: |
          echo "❌ Deployment Failed!"
          echo ""
          echo "📝 Debug steps:"
          echo "  1. SSH to server: ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}"
          echo "  2. Check logs: docker logs pesa-mind-app-1"
          echo "  3. Check status: docker ps"
          echo "  4. Redeploy manually: cd ~/pesa-mind && ./deploy.sh"



