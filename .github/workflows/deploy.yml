name: Deploy to Server on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code from the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up SSH agent with the private key from GitHub Secrets
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # Step 3: Copy project files to the server using rsync
      - name: Copy files to server
        run: |
          rsync -avz --exclude '.git*' --exclude 'test/' --exclude 'doc/' ./ deploy@${{ secrets.SERVER_IP }}:/home/deploy/pesa-mind

      # Step 4: Copy .env file to the server
      - name: Copy .env file
        run: |
          echo "$ENV_FILE_CONTENT" | ssh deploy@${{ secrets.SERVER_IP }} 'cat > /home/deploy/pesa-mind/.env'
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE_CONTENT }}

      # Step 5: Deploy the application on the server
      - name: Deploy on server
        run: |
          ssh deploy@${{ secrets.SERVER_IP }} << 'EOF'
            # Ensure Docker Compose is installed and up-to-date
            if ! command -v docker compose &> /dev/null; then
              echo "Docker Compose not found. Installing..."
              sudo curl -L "https://github.com/docker/compose/releases/download/v2.20.2/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            fi

            # Navigate to the project directory
            cd /home/deploy/pesa-mind

            # Build and restart the application
            docker compose build --no-cache
            docker compose down
            docker compose up -d --remove-orphans
          EOF