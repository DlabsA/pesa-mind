name: Deploy to Server on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code from the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up SSH agent with the private key from GitHub Secrets
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # Step 3: Add server's SSH fingerprint to known_hosts
      - name: Add server to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      # Step 4: Pull the latest changes on the server
      - name: Deploy application
        run: |
          ssh deploy@${{ secrets.SERVER_IP }} << 'EOF'
            # Navigate to the project directory or clone the repository if it doesn't exist
            if [ ! -d "/home/deploy/pesa-mind/.git" ]; then
              git clone git@github.com:DlabsA/pesa-mind.git /home/deploy/pesa-mind
            fi

            cd /home/deploy/pesa-mind

            # Pull the latest changes
            git reset --hard
            git pull origin main

            # Ensure Docker Compose is installed and up-to-date
            if ! command -v docker compose &> /dev/null; then
              echo "Docker Compose not found. Installing..."
              sudo curl -L "https://github.com/docker/compose/releases/download/v2.20.2/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            fi

            # Ensure the .env file exists
            if [ ! -f ".env" ]; then
              echo "$ENV_FILE_CONTENT" > .env
            fi

            # Build and restart the application
            docker compose build --no-cache
            docker compose down
            docker compose up -d --remove-orphans
          EOF
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE_CONTENT }}
