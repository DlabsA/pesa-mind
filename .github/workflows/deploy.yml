name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 1. Write the private key to a temp file ──────────────────────────────
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # ── 2. SSH in, pull latest code, rebuild & restart containers ────────────
      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'

            set -e

            # Path where the repo lives on your server
            cd ~/pesa-mind

            # Pull latest changes
            git pull origin main

            # Write production .env from GitHub secret (if you store it)
            # echo "${{ secrets.ENV_FILE }}" > .env   # uncomment if needed

            # Rebuild and restart in detached mode
            docker compose up -d --build

            # Remove dangling images to save disk space
            docker image prune -f

          EOF

      # ── 3. (Optional) Quick health check ────────────────────────────────────
      - name: Health check
        run: |
          sleep 5
          curl --fail http://${{ secrets.SERVER_HOST }}:8080/health || echo "Health check endpoint not found – check manually"