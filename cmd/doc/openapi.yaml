components:
  schemas:
    Problem:
      description: Problem Details (RFC 9457)
      properties:
        detail:
          description: A human-readable explanation specific to this occurrence of the problem
          type: string
        instance:
          description: A URI reference that identifies the specific occurrence of the problem
          format: uri
          type: string
        status:
          description: The HTTP status code
          type: integer
        title:
          description: A short, human-readable summary of the problem
          type: string
        type:
          description: A URI reference that identifies the problem type
          format: uri
          type: string
      required:
      - title
      - status
      type: object
    
    # Budget Schemas
    CreateBudgetRequest:
      type: object
      properties:
        name:
          type: string
        amount:
          type: number
          format: double
        period:
          type: string
          example: "monthly"
        start_date:
          type: integer
          format: int64
        end_date:
          type: integer
          format: int64
      required:
        - name
        - amount
        - period
        - start_date
        - end_date
    
    BudgetResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        name:
          type: string
        amount:
          type: number
          format: double
        period:
          type: string
        start_date:
          type: integer
          format: int64
        end_date:
          type: integer
          format: int64
    
    UpdateBudgetRequest:
      type: object
      properties:
        name:
          type: string
        amount:
          type: number
          format: double
        period:
          type: string
        start_date:
          type: integer
          format: int64
        end_date:
          type: integer
          format: int64
    
    # Budget Transaction Schemas
    BudgetTransactionRequest:
      type: object
      properties:
        name:
          type: string
        amount:
          type: number
          format: double
        type:
          type: string
          enum: ["income", "expense", "saving"]
      required:
        - name
        - amount
        - type
    
    BudgetTransactionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        amount:
          type: number
          format: double
        type:
          type: string
        created_at:
          type: integer
          format: int64
    
    # Monthly Budget Schemas
    CreateMonthlyBudgetRequest:
      type: object
      properties:
        yearly_budget_id:
          type: string
          format: uuid
        month:
          type: integer
          minimum: 1
          maximum: 12
        year:
          type: integer
          format: int64
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/BudgetTransactionRequest"
      required:
        - yearly_budget_id
        - month
        - year
    
    MonthlyBudgetResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        yearly_budget_id:
          type: string
          format: uuid
        month:
          type: integer
        year:
          type: integer
          format: int64
        total_expenditures:
          type: integer
          format: uint64
        total_income:
          type: integer
          format: uint64
        total_savings:
          type: integer
          format: uint64
        total_transactions:
          type: integer
          format: uint64
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/BudgetTransactionResponse"
        created_at:
          type: integer
          format: int64
        updated_at:
          type: integer
          format: int64
    
    # Yearly Budget Schemas
    CreateYearlyBudgetRequest:
      type: object
      properties:
        year:
          type: integer
          format: int64
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/BudgetTransactionRequest"
      required:
        - year
    
    YearlyBudgetResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        year:
          type: integer
          format: int64
        total_expenditures:
          type: integer
          format: uint64
        total_income:
          type: integer
          format: uint64
        total_savings:
          type: integer
          format: uint64
        total_transactions:
          type: integer
          format: uint64
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/BudgetTransactionResponse"
        created_at:
          type: integer
          format: int64
        updated_at:
          type: integer
          format: int64
